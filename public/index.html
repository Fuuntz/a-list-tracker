<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-List Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1><span class="gradient-text">A-List</span> Tracker</h1>
            <button id="settingsBtn" class="icon-button" aria-label="Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Stats Section -->
        <section class="stats-grid">
            <div class="stat-card glass-panel">
                <h3 class="stat-title">A-List Movies</h3>
                <p class="stat-value" id="totalAList">0</p>
            </div>
            <div class="stat-card glass-panel">
                <h3 class="stat-title">Avg Ticket Price</h3>
                <p class="stat-value gradient-text" id="avgTicketPrice">$0.00</p>
            </div>
        </section>

        <!-- Movie Sections -->
        <div class="lists-container">
            <!-- Inbox (Unmarked) -->
            <section class="list-section inbox-section">
                <div class="section-header">
                    <h2>Inbox <span class="badge" id="inboxCount">0</span></h2>
                    <button id="refreshBtn" class="refresh-button">Refresh RSS</button>
                </div>
                <div class="movie-list" id="inboxList">
                    <div class="empty-state">No new movies to review.</div>
                </div>
            </section>

            <!-- History (Marked) -->
            <section class="list-section history-section">
                <div class="section-header">
                    <h2>History</h2>
                </div>
                <div class="movie-list glass-panel" id="historyList">
                    <div class="empty-state">No history yet.</div>
                </div>
            </section>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="settingsForm">
                <div class="form-group">
                    <label for="username">Letterboxd Username</label>
                    <input type="text" id="username" name="username" placeholder="e.g. fuuntz" required>
                </div>
                <div class="form-group">
                    <label for="monthlyCost">A-List Monthly Cost ($)</label>
                    <input type="number" id="monthlyCost" name="monthlyCost" step="0.01" min="0" value="30.00" required>
                </div>
                <button type="submit" class="btn-primary">Save Settings</button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
